version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    groups:
      all-deps:
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directory: "/test"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    groups:
      all-deps:
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    groups:
      all-deps:
        patterns:
          - "*"
