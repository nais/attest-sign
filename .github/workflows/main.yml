name: Build, Tag, and Push Image for Attest Sign Integration Test

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run in dry-run mode? Runs in dry-run mode by default."
        required: false
        type: string
        default: 'true'
      major:
        type: string
        required: false
        description: "Major version number to use for the release tag."
        default: "2"

env:
  IMAGE: europe-north1-docker.pkg.dev/nais-management-7178/nais-verification/attest-sign

jobs:
  build:
    name: Build container and push to GAR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    outputs:
      image: ${{ steps.image.outputs.value }}
      digest: ${{ steps.docker_build_push.outputs.digest }}
      deploy_tag: ${{ steps.tags.outputs.deploy_tag }}
      new_tag: ${{ steps.tags.outputs.new_tag }}
      major: ${{ inputs.major }}
      dry_run: ${{ inputs.dry_run }}

    steps:
      - name: Checkout source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # ratchet:actions/checkout@v6

      - name: Compute next release & deployment tags
        id: tags
        run: |
          set -e

          git fetch --tags --force

          requested_major="${{ inputs.major }}"
          latest_tag=$(git tag -l "v${requested_major}.*" | sort -V | tail -n 1 || echo "")

          if [ -z "$latest_tag" ]; then
            major="$requested_major"
            minor=0
            patch=0
          else
            major=$(echo "$latest_tag" | cut -d'.' -f1 | sed 's/v//')
            minor=$(echo "$latest_tag" | cut -d'.' -f2)
            patch=$(echo "$latest_tag" | cut -d'.' -f3)
          fi

          new_patch=$((patch + 1))
          new_tag="v${major}.${minor}.${new_patch}"

          # Timestamp for deployment tag: YYYYMMDD-HHMMSS (UTC)
          timestamp=$(date -u +"%Y%m%d-%H%M%S")
          deploy_tag="${new_tag}-${timestamp}"

          echo "Computed release tag: $new_tag"
          echo "Computed deploy tag:  $deploy_tag"

          echo "new_tag=${new_tag}" >> "$GITHUB_OUTPUT"
          echo "deploy_tag=${deploy_tag}" >> "$GITHUB_OUTPUT"

      - name: Create Release Tag
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -e
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          new_tag="${{ steps.tags.outputs.new_tag }}"

          git tag -a "$new_tag" -m "Release $new_tag"

          if [ "$DRY_RUN" = "false" ]; then
            echo "Pushing release tag $new_tag"
            git push origin "$new_tag"
          else
            echo "Dry run enabled, skipping tag push."
          fi

      - name: Push docker image to GAR
        id: docker_build_push
        uses: nais/docker-build-push@05dbb6091b30bd84279c6d64a45ef8782fd410a5 # ratchet:nais/docker-build-push@v0
        with:
          team: nais-verification
          tag: ${{ steps.tags.outputs.deploy_tag }}
          salsa: 'false'
          docker_context: 'test'
          project_id: 'nais-management-7178'
          identity_provider: 'projects/718161667033/locations/global/workloadIdentityPools/dev-nais-identity-pool/providers/github-oidc-provider'

      - name: Set image output
        id: image
        run: echo "value=europe-north1-docker.pkg.dev/nais-management-7178/nais-verification/attest-sign" >> "$GITHUB_OUTPUT"

      - name: Attest and sign test image
        uses: './'
        with:
          image_ref: ${{ steps.image.outputs.value }}@${{ steps.docker_build_push.outputs.digest }}

  slsa_provenance:
    name: Generate SLSA provenance
    needs:
      - build
    permissions:
      actions: read
      id-token: write
      packages: write
    uses: ./.github/workflows/slsa-provenance.yml
    with:
      image: ${{ needs.build.outputs.image }}
      digest: ${{ needs.build.outputs.digest }}
      workload_identity_provider: projects/718161667033/locations/global/workloadIdentityPools/dev-nais-identity-pool/providers/github-oidc-provider
      service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

  deploy:
    name: Deploy attest-sign-integration-test to NAIS
    runs-on: ubuntu-latest
    needs:
      - build
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6

      - name: Deploy attest-sign-integration-test to NAIS
        uses: nais/deploy/actions/deploy@5fdd91aaf69bb0d6dd5e5118cdacb639f487b93b # ratchet:nais/deploy/actions/deploy@v2
        env:
          CLUSTER: dev
          RESOURCE: test/nais.yml
          DEPLOY_SERVER: deploy.dev-nais.cloud.nais.io:443
          VAR: image=${{ needs.build.outputs.image }}:${{ needs.build.outputs.deploy_tag }}

      - name: Update Floating v${{ needs.build.outputs.major }} Tag
        if: ${{ success() && needs.build.outputs.dry_run == 'false' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git fetch --tags --force

          major="${{ needs.build.outputs.major }}"
          new_tag="${{ needs.build.outputs.new_tag }}"

          echo "Updating floating tag 'v${major}' → $new_tag"
          git tag -f "v${major}" "$new_tag"
          git push origin -f "v${major}"
